---
- name: Provision Laravel Environment
  hosts: all
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install PHP and Nginx
      ansible.builtin.apt:
        name:
          - "nginx"
          - "php{{ php_version | default('8.2') }}-fpm"
          - "php{{ php_version | default('8.2') }}-mysql"
          - "php{{ php_version | default('8.2') }}-curl"
          - "php{{ php_version | default('8.2') }}-xml"
          - git
          - unzip
        state: present

    - name: Download Composer installer
      ansible.builtin.get_url:
        url: https://getcomposer.org/installer
        dest: /tmp/composer-setup.php
        mode: "0644"

    - name: Install Composer
      ansible.builtin.command:
        argv:
          - php
          - /tmp/composer-setup.php
          - --install-dir=/usr/local/bin
          - --filename=composer
      args:
        creates: /usr/local/bin/composer
